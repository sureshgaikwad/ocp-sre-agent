# Demo Scenario 1: OOM Kill (Out of Memory)
#
# This pod will continuously allocate memory until it hits the 128Mi limit,
# triggering an OOMKill event that the SRE agent should detect and diagnose.
#
# Expected Agent Behavior:
# 1. PodCollector detects pod in CrashLoopBackOff
# 2. OOMAnalyzer identifies exit code 137
# 3. Diagnosis: "Memory limit too low"
# 4. Recommendation: Increase memory from 128Mi to 512Mi
---
apiVersion: v1
kind: Namespace
metadata:
  name: sre-demo
  labels:
    demo: "sre-agent"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-test
  namespace: sre-demo
  labels:
    app: oom-test
    scenario: "oom-kill"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-test
  template:
    metadata:
      labels:
        app: oom-test
    spec:
      containers:
      - name: memory-hog
        image: polinux/stress:latest
        command:
        - stress
        - --vm
        - "1"
        - --vm-bytes
        - "150M"
        - --vm-hang
        - "0"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"  # Intentionally low to trigger OOM
            cpu: "100m"
      restartPolicy: Always
---
# Annotation for documentation
apiVersion: v1
kind: ConfigMap
metadata:
  name: oom-test-info
  namespace: sre-demo
data:
  description: |
    OOM Kill Demo Scenario

    This deployment intentionally sets a low memory limit (128Mi)
    but attempts to allocate 300MB, causing an OOMKill.

    Expected Timeline:
    - T+10s: Pod starts, begins memory allocation
    - T+15s: OOMKilled (exit code 137)
    - T+20s: Kubernetes restarts pod
    - T+30s: SRE Agent detects CrashLoopBackOff
    - T+45s: SRE Agent creates OOMKilled diagnosis

    Verification:
      oc describe pod -n sre-demo -l app=oom-test | grep "OOMKilled"
      oc logs -n sre-agent deployment/sre-agent -c agent | grep "OOMKilled"
